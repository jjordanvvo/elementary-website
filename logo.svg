<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" width="280" height="120">
  <!-- Shield crest -->
  <path d="M60 8 L100 20 L100 55 C100 78 82 92 60 100 C38 92 20 78 20 55 L20 20 Z" fill="#14213D" stroke="#D4A017" stroke-width="2"/>
  <!-- Cross at top -->
  <rect x="57" y="26" width="6" height="22" rx="1" fill="#D4A017"/>
  <rect x="49" y="33" width="22" height="6" rx="1" fill="#D4A017"/>
  <!-- GHA monogram center -->
  <text x="60" y="72" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">GHA</text>
  <!-- Oak branch left -->
  <path d="M22 62 Q28 58 26 52 Q32 56 30 62" fill="#D4A017" opacity="0.7"/>
  <!-- Oak branch right -->
  <path d="M98 62 Q92 58 94 52 Q88 56 90 62" fill="#D4A017" opacity="0.7"/>
  <!-- School name -->
  <text x="140" y="38" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#14213D" text-anchor="middle" letter-spacing="1">GROVE HERITAGE ACADEMY</text>
  <!-- Tagline -->
  <text x="140" y="58" font-family="Arial, sans-serif" font-size="11" fill="#6C7A89" text-anchor="middle" letter-spacing="2">HOMESCHOOL HIGH SCHOOL</text>
  <!-- Est line -->
  <line x1="105" y1="68" x2="175" y2="68" stroke="#D4A017" stroke-width="1"/>
  <text x="140" y="80" font-family="Arial, sans-serif" font-size="10" fill="#D4A017" text-anchor="middle" letter-spacing="3">EST. 1973</text>
  <!-- Tagline motto -->
  <text x="140" y="100" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#6C7A89" text-anchor="middle">Rooted in Faith. Growing in Purpose.</text>
